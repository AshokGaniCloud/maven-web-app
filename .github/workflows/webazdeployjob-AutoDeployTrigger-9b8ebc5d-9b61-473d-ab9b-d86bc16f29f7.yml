name: Trigger auto deployment for webazdeployjob

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/webazdeployjob-AutoDeployTrigger-9b8ebc5d-9b61-473d-ab9b-d86bc16f29f7.yml'

  # Allow manual trigger 
  workflow_dispatch:
  
permissions: 
  actions: write
  contents: read
  deployments: write
  packages: write
  id-token: write
  security-events: write
  pull-requests: read
  
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Install Azure Cli Version
        run: |
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
            echo " "
            az version
      - name: Run Azure CLI script
        uses: azure/CLI@v1 # Use the Azure CLI action
        with:
          # Optional: specify a specific version (e.g., '2.30.0'), defaults to the agent's version or latest
            azcliversion: 2.56.0 
            inlineScript: |
                    az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{secrets.AZURE_CLIENT_SECRET}} --tenant  ${{ secrets.AZURE_TENANT_ID }}
                    az account show
                    az group list --output table
         

      

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: index.docker.io
          registryUsername: ${{ secrets.WEBAZDEPLOYJOB_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.WEBAZDEPLOYJOB_REGISTRY_PASSWORD }}
          containerAppName: webazdeployjob
          resourceGroup: webazcon
          imageToBuild: index.docker.io/webazdeployimg:${{ github.sha }}
          
            

     

